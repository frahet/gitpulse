gitpulse:
  port: 3000

  repos:
    # GitHub (recommended) — no volume mount needed
    - name: "my-app"
      source: "github"
      owner: "myorg"
      repo: "my-app"
      branch: "main"
      # token: "ghp_..."   # or set GITHUB_TOKEN env var

    # GitLab
    # - name: "backend"
    #   source: "gitlab"
    #   project_id: "12345678"   # found in GitLab project → Settings → General
    #   branch: "main"
    #   host: "https://gitlab.com"   # omit for gitlab.com, set for self-hosted
    #   token: "glpat-..."           # or set GITLAB_TOKEN env var

    # Local (Docker volume or absolute path)
    # - name: "legacy-app"
    #   source: "local"
    #   path: "/repos/legacy-app"
    #   branch: "main"

  ai:
    enabled: true
    provider: "anthropic"         # anthropic | openai | google | mistral
    model: "claude-sonnet-4-6"
    # provider: "openai"
    # model: "gpt-4o"
    # provider: "google"
    # model: "gemini-2.0-flash"
    # provider: "mistral"
    # model: "mistral-large-latest"
    summary_style: "standup"      # standup | management | technical
    context: null                 # describe your project so AI understands domain
    # context: "Web3 SaaS. Users pay with ERC-20 tokens. Main repos: frontend (Next.js), contracts (Solidity)."
    diff_commits: 5               # how many recent commits to read actual diffs for
    diff_max_lines: 80            # truncate each diff at this many lines

  reports:
    schedule: "0 9 * * 1-5"      # cron — weekdays at 9am. Set null to disable.
    lookback_days: 7
    output_formats:
      - html
      - markdown
      - json

  auth:
    enabled: false
    username: "admin"
    password: "changeme"

  notifications:
    slack:
      enabled: false
      webhook_url: null           # https://hooks.slack.com/services/...
      style: "standup"
    email:
      enabled: false
      smtp_host: null             # smtp.gmail.com | smtp.sendgrid.net | etc.
      smtp_port: 587
      smtp_user: null
      smtp_pass: null             # or set SMTP_PASS env var
      to: null                    # recipient — comma-separate for multiple
