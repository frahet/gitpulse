gitpulse:
  port: 3000

  repos:
    - name: "my-app"
      path: "/repos/my-app"       # local path — mount via Docker volume
      branch: "main"
    - name: "backend-api"
      path: "/repos/backend-api"
      branch: "main"

  ai:
    enabled: true
    provider: "anthropic"         # anthropic | openai | google | mistral
    model: "claude-sonnet-4-6"
    # provider: "openai"
    # model: "gpt-4o"
    
    # provider: "google"
    # model: "gemini-2.0-flash"
    # provider: "mistral"
    # model: "mistral-large-latest"
    summary_style: "standup"      # standup | management | technical

  reports:
    schedule: "0 9 * * 1-5"      # weekdays at 9am
    lookback_days: 7
    output_formats:
      - html
      - markdown
      - json

  auth:
    enabled: false
    username: "admin"
    password: "changeme"
